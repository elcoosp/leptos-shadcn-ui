name: Bundle Size Monitor

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  bundle-size-check:
    name: Check Bundle Size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Download baseline from main branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            curl --fail --silent --output .bundle-size-baseline.json \
              "https://raw.githubusercontent.com/${{ github.repository }}/main/.bundle-size-baseline.json" || true
          fi

      - name: Run bundle size check
        run: scripts/ci/check_bundle_size.sh
        env:
          BUNDLE_SIZE_THRESHOLD: "5.0"
          BUNDLE_SIZE_BASELINE: ".bundle-size-baseline.json"
          BUNDLE_SIZE_REPORT: "bundle-size-report.json"

      - name: Upload bundle size report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: bundle-size-report
          path: bundle-size-report.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            try {
              const report = JSON.parse(fs.readFileSync('bundle-size-report.json', 'utf8'));
              const summary = report.summary;
              const comparisons = report.comparisons || [];

              let body = "## Bundle Size Report\n\n";

              body += `### Summary\n`;
              body += `- **Total Size:** ${formatBytes(summary.total_size)}\n`;
              body += `- **Baseline:** ${formatBytes(summary.baseline_total)}\n`;
              body += `- **Delta:** ${summary.total_delta_percent}%\n`;
              body += `- **Status:** ${summary.passed ? '✅ PASS' : '❌ FAIL'}\n\n`;

              if (comparisons.length > 0) {
                body += `### Bundle Changes\n\n`;
                body += `| Bundle | Baseline | Current | Delta | Change | Status |\n`;
                body += `|--------|----------|---------|-------|--------|--------|\n`;

                for (const comp of comparisons) {
                  const statusIcon = comp.status === 'DECREASED' ? '🟢' :
                                    comp.status === 'INCREASED' ? '🔴' :
                                    comp.status === 'NEW' ? '🆕' : '⚪';

                  body += `| ${comp.name} | ${formatBytes(comp.baseline_size)} | ${formatBytes(comp.current_size)} | ${formatDelta(comp.delta_bytes)} | ${comp.delta_percent}% | ${statusIcon} ${comp.status} |\n`;
                }
              }

              body += `\n---\n`;
              body += `*Threshold: ${summary.threshold_percent}% | Branch: ${report.branch} | Commit: ${report.commit.substring(0, 8)}*`;

              // Find existing comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const botComment = comments.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body.includes('Bundle Size Report')
              );

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body
                });
              }
            } catch (error) {
              console.log('Could not create comment:', error.message);
            }

            function formatBytes(bytes) {
              if (bytes === 0) return '0 B';
              if (bytes >= 1024 * 1024) {
                return (bytes / (1024 * 1024)).toFixed(2) + ' MiB';
              } else if (bytes >= 1024) {
                return (bytes / 1024).toFixed(2) + ' KiB';
              } else {
                return bytes + ' B';
              }
            }

            function formatDelta(bytes) {
              const abs = Math.abs(bytes);
              const formatted = formatBytes(abs);
              return bytes >= 0 ? `+${formatted}` : `-${formatted}`;
            }

  update-baseline:
    name: Update Baseline
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: bundle-size-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Build WASM packages
        run: cargo build --target wasm32-unknown-unknown --release --workspace

      - name: Create baseline
        run: cargo run --bin bundle-size-monitor -- baseline .bundle-size-baseline.json

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v3
        with:
          name: bundle-size-baseline
          path: .bundle-size-baseline.json
          retention-days: 90

      - name: Commit baseline to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .bundle-size-baseline.json
          git diff --staged --quiet || git commit -m "chore: Update bundle size baseline"
          git push
