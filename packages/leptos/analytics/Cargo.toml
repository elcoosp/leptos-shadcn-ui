[package]
name = "leptos-shadcn-analytics"
description = "Component usage analytics tracking for Leptos applications"

authors.workspace = true
edition = "2021"
license.workspace = true
repository.workspace = true
version = "0.1.0"

[dependencies]
leptos.workspace = true
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["Storage", "Window"] }
js-sys = "0.3"
gloo-storage = "0.3"

[dev-dependencies]
wasm-bindgen-test = { workspace = true }
getrandom = { workspace = true }

[features]
default = []
localStorage = []
memory = []
full = ["localStorage", "memory"]
